<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMMORTAL JELLYFISH — SYSTEM REGENERATION</title>
    <style>
        /* Raw, Brutalist Monochrome Cyberpunk Interface */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #333;
            padding: 30px;
            background: #050505;
        }
        h1 {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-top: 0;
            color: #00ff00;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #888;
        }
        input[type="file"], input[type="text"], select {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
        }
        input[type="file"] {
            cursor: pointer;
        }
        input[type="text"]:focus, select:focus {
            border-color: #666;
        }
        button {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #00ff00;
        }
        .preview-box {
            margin-top: 30px;
            border: 1px dashed #333;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020202;
        }
        #resultImage {
            max-width: 100%;
            display: block;
        }
        .status-log {
            font-size: 11px;
            color: #666;
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>[PROD MVP LIVE] QUANTUM CONVERTER</h1>
    
    <div class="form-group">
        <label>Исходный квантовый объект (Изображение)</label>
        <input type="file" accept="image/jpeg,image/png">
    </div>
    
    <div class="form-group">
        <label>Математический стабилизатор хаоса (LUT)</label>
        <select>
            <option value="riemann">Riemann Zeta Matrix</option>
            <option value="yang_mills">Yang-Mills Mass Gap</option>
            <option value="noir">Topological Noir</option>
            <option value="peugeot_night">Peugeot Night Shift</option>
            <option value="zeta">Zeta Function Zeroes</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Лицензионный дескриптор (Premium Token)</label>
        <input type="text" placeholder="FREE MODE (Max 800px) / Введите ключ">
    </div>
    
    <button onclick="uploadImage()">Стабилизировать хаос</button>
    
    <div class="preview-box">
        <img id="resultImage" src="" alt="[ОЖИДАНИЕ ВВОДНЫХ БАЙТОВ]">
    </div>
    
    <div id="statusLog" class="status-log">SYS: SYSTEM READY. ENGINE ONLINE.</div>
</div>

<script>
// --- ТОТ САМЫЙ АВТОНОМНЫЙ JS-БЛОК, ЗАВЕРНУТЫЙ В СКРИПТ ---
async function uploadImage() {
    const fileInput = document.querySelector('input[type="file"]');
    const lutSelect = document.querySelector('select');
    const tokenInput = document.querySelector('input[type="text"]') || { value: '' };
    const resultImage = document.getElementById('resultImage');
    const statusLog = document.getElementById('statusLog');
    if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
        alert("КРИТИЧЕСКИЙ СБОЙ: Исходный кадр не обнаружен. Выберите файл.");
        return;
    }
    if (statusLog) statusLog.innerText = "SYS: CONNECTING TO CORE ENGINE... STANDBY.";
    const formData = new FormData();
    formData.append('file', fileInput.files[0]); // Передаем конкретный первый файл из массива
    formData.append('lut', lutSelect ? lutSelect.value : 'riemann');
    formData.append('token', tokenInput.value ? tokenInput.value.trim() : '');
    try {
        console.log("Запуск стабилизатора хаоса. Канал связи открыт...");
        
        const response = await fetch('https://onrender.com', {
            method: 'POST',
            body: formData
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`Код бэкенда: ${response.status}. Текст: ${errText}`);
        }
        const imageBlob = await response.blob();
        const objectURL = URL.createObjectURL(imageBlob);
        
        if (resultImage) {
            resultImage.src = objectURL;
            if (statusLog) statusLog.innerText = "SYS: TOPOLOGICAL INVARIANTS CALIBRATED. SUCCESS.";
            console.log("Матрица успешно наложена. Порядок восстановлен.");
        }
    } catch (error) {
        console.error("Сбой fetch потока:", error);
        if (statusLog) statusLog.innerText = `SYS: ERROR - ${error.message}`;
        alert(`Ошибка калибровки: ${error.message}\nПосмотрите F12 -> Console.`);
    }
}
</script>

</body>
</html>
